name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test PG${{ matrix.pg }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg: [16, 17, 18]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-pg${{ matrix.pg }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-pg${{ matrix.pg }}-cargo-

      - name: Install cargo-pgrx
        run: cargo install cargo-pgrx --version "=0.12.9" --locked

      - name: Initialize pgrx for PG${{ matrix.pg }}
        run: cargo pgrx init --pg${{ matrix.pg }} download

      - name: Run tests
        run: cargo pgrx test pg${{ matrix.pg }}
        env:
          # Required on macOS with Apple clang for bindgen to find system headers
          BINDGEN_EXTRA_CLANG_ARGS: "-I$(xcrun --show-sdk-path)/usr/include"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Check formatting
        run: cargo fmt --check
      - name: Install cargo-pgrx (for feature flags)
        run: cargo install cargo-pgrx --version "=0.12.9" --locked
      - name: Initialize pgrx
        run: cargo pgrx init --pg17 download
      - name: Clippy
        run: cargo clippy --features pg17 -- -D warnings
