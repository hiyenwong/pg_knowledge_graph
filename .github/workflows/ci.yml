name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_PGRX_VERSION: "=0.17.0"

jobs:
  test:
    name: Test PG${{ matrix.pg }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg: [16, 17, 18]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-pg${{ matrix.pg }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-pg${{ matrix.pg }}-cargo-

      - name: Install system dependencies (Ubuntu)
        run: sudo apt-get update && sudo apt-get install -y libclang-dev clang libreadline-dev zlib1g-dev

      - name: Install cargo-pgrx
        run: cargo install cargo-pgrx --version "${{ env.CARGO_PGRX_VERSION }}" --locked

      - name: Initialize pgrx for PG${{ matrix.pg }}
        run: cargo pgrx init --pg${{ matrix.pg }} download

      - name: Install pgvector
        run: |
          git clone --branch v0.8.0 https://github.com/pgvector/pgvector.git
          cd pgvector
          export PG_CONFIG=~/.pgrx/${{ matrix.pg }}.*/pgrx-install/bin/pg_config
          make
          make install

      - name: Run tests
        run: cargo pgrx test pg${{ matrix.pg }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install system dependencies (Ubuntu)
        run: sudo apt-get update && sudo apt-get install -y libclang-dev clang libreadline-dev zlib1g-dev

      - name: Check formatting
        run: cargo fmt --check

      - name: Install cargo-pgrx
        run: cargo install cargo-pgrx --version "${{ env.CARGO_PGRX_VERSION }}" --locked

      - name: Initialize pgrx
        run: cargo pgrx init --pg18 download

      - name: Install pgvector
        run: |
          git clone --branch v0.8.0 https://github.com/pgvector/pgvector.git
          cd pgvector
          export PG_CONFIG=~/.pgrx/18.*/pgrx-install/bin/pg_config
          make
          make install

      - name: Clippy
        run: cargo clippy --no-default-features --features pg18 -- -D warnings
